<script>
(function() {
  const manifest = {
    name: "Calendario E & B",
    short_name: "E&B Cal",
    description: "Calendario personale con note, spese e ricorrenze",
    start_url: "./",
    display: "standalone",
    background_color: "#f7f3ec",
    theme_color: "#C8963E",
    orientation: "portrait-primary",
    icons: [
      { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%23C8963E'/%3E%3Ctext x='256' y='320' font-family='serif' font-size='260' font-weight='900' fill='white' text-anchor='middle'%3E📅%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel   = 'manifest';
  link.href  = url;
  document.currentScript.parentNode.appendChild(link);
})();
</script>

<!-- jsQR - lettore QR code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap');

:root {
  --ettore:     #6B7A45;
  --ettore-bg:  #e8ecda;
  --barbara:    #A07850;
  --barbara-bg: #f2e8d8;
  --ocra:       #C8963E;
  --text-dark:  #2a2218;
  --text-mid:   #5a4e3a;
  --col-w:      34px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f7f3ec;
  font-family: 'Lato', sans-serif;
  color: var(--text-dark);
  padding: 20px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
  padding-left: calc(20px + env(safe-area-inset-left));
  padding-right: calc(20px + env(safe-area-inset-right));
  background-image:
    radial-gradient(circle at 20% 20%, rgba(107,122,69,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(160,120,80,0.08) 0%, transparent 50%);
}

/* ── HEADER ─────────────────────────────────────────── */
header {
  text-align: center; margin-bottom: 36px;
  padding: 28px 0 20px;
  border-bottom: 3px solid var(--barbara);
  position: relative;
}
header::before {
  content: ''; position: absolute;
  bottom: -6px; left: 50%; transform: translateX(-50%);
  width: 60%; height: 1px; background: var(--ettore);
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem; font-weight: 900; letter-spacing: 0.06em;
}
header h1 span { color: var(--ettore); }

.legend {
  display: flex; justify-content: center; gap: 40px;
  margin: 14px 0 0; font-size: 0.85rem;
  letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700;
}
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-dot  { width: 16px; height: 16px; border-radius: 3px; }
.legend-dot.ettore  { background: var(--ettore); }
.legend-dot.barbara { background: var(--barbara); }

/* ── GRIGLIA MESI ────────────────────────────────────── */
.months-grid {
  max-width: 520px; margin: 0 auto;
}
.month-block {
  background: #fff; border-radius: 10px; overflow: hidden;
  box-shadow: 0 2px 16px rgba(42,34,24,0.09);
}
.month-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem; font-weight: 700; text-align: center;
  padding: 11px 10px 9px; background: var(--ocra);
  color: #fff; letter-spacing: 0.14em; text-transform: uppercase;
}

/* Navigazione mese */
.month-nav {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  margin-bottom: 18px;
}
.month-nav-btn {
  background: #fff; border: 2px solid #ddd; border-radius: 8px;
  width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; cursor: pointer; color: var(--text-mid);
  transition: all 0.15s; flex-shrink: 0;
}
.month-nav-btn:hover { border-color: var(--ocra); color: var(--ocra); }
.month-nav-label {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem; font-weight: 700; color: var(--text-dark);
  min-width: 180px; text-align: center;
}

/* ── GRIGLIA GIORNI ──────────────────────────────────── */
.cal-grid {
  display: grid;
  grid-template-columns: var(--col-w) repeat(7, 1fr);
  width: 100%;
}
.cal-header { display: contents; }
.cal-header > div {
  padding: 6px 2px 5px; text-align: center; font-weight: 700;
  font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-mid); border-bottom: 1px solid #e0d8cc; background: #faf7f2;
}
.cal-header > div:first-child { color: #bbb; font-size: 0.58rem; }

/* Cella W */
.cell-w {
  display: flex; align-items: center; justify-content: center;
  padding: 4px 2px; border-bottom: 1px solid rgba(0,0,0,0.04);
}
.week-num {
  font-size: 0.63rem; font-weight: 800; color: #fff;
  border-radius: 3px; padding: 2px 5px; display: inline-block; line-height: 1.4;
}
.wn-ettore  { background: var(--ettore); }
.wn-barbara { background: var(--barbara); }

/* Wrapper 7 celle giorni */
.week-days-wrap {
  grid-column: 2 / 9;
  position: relative;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.week-days-wrap[data-owner="ettore"]  { background: var(--ettore-bg); }
.week-days-wrap[data-owner="barbara"] { background: var(--barbara-bg); }

/* Filigrana */
.week-days-wrap::before {
  content: attr(data-name);
  position: absolute;
  left: calc(-1 * var(--col-w)); right: 0;
  bottom: 2px;
  text-align: center;
  font-family: 'Lato', sans-serif;
  font-weight: 700; font-size: 0.52rem;
  letter-spacing: 0.22em; text-transform: uppercase;
  white-space: nowrap; pointer-events: none; user-select: none; z-index: 0;
}
.week-days-wrap[data-owner="ettore"]::before  { color: var(--ettore);  opacity: 0.25; }
.week-days-wrap[data-owner="barbara"]::before { color: var(--barbara); opacity: 0.25; }

/* Cella giorno */
.day-cell {
  padding: 4px 1px 3px; text-align: center;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; z-index: 1; min-height: 34px;
}
.day-cell.in-month { cursor: pointer; }
.day-cell.in-month:hover .day-num { background: rgba(0,0,0,0.08); }
.day-cell.day-override-ettore  { background: var(--ettore-bg) !important; }
.day-cell.day-override-barbara { background: var(--barbara-bg) !important; }

/* Numero giorno */
.day-num {
  font-size: 0.82rem; font-weight: 700; color: var(--text-dark);
  width: 24px; height: 24px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%; position: relative; z-index: 2; line-height: 1;
}
.day-num.holiday { font-weight: 900; color: #8b1a1a; }
.day-num.empty   { opacity: 0.2; }

/* Badge sul numero: pallino colorato in alto a destra */
.day-num .day-badge {
  position: absolute; top: -2px; right: -2px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ocra); border: 1.5px solid #fff;
  z-index: 3; pointer-events: none;
}

/* Icone sotto il numero */
.day-icons {
  display: flex; gap: 2px; justify-content: center;
  min-height: 8px; margin-top: 1px;
}
.icon-note     { font-size: 0.55rem; line-height: 1; }
.icon-birthday { font-size: 0.6rem;  line-height: 1; }
.icon-event    { font-size: 0.6rem;  line-height: 1; }
.icon-expense  { font-size: 0.58rem; line-height: 1; color: #c0392b; }

/* ── MODALE ──────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(42,34,24,0.5); z-index: 1000;
  align-items: flex-start; justify-content: center;
  overflow-y: auto; padding: 20px 10px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: #fff; border-radius: 12px;
  box-shadow: 0 8px 40px rgba(42,34,24,0.22);
  padding: 24px 24px 20px; width: 360px; max-width: 95vw;
  position: relative;
  animation: fadeIn 0.18s ease;
  margin: auto;
}
@keyframes fadeIn {
  from { transform: scale(0.93); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
.modal-close {
  position: absolute; top: 12px; right: 14px;
  background: none; border: none; font-size: 1.3rem;
  cursor: pointer; color: #bbb; line-height: 1;
}
.modal-close:hover { color: var(--text-dark); }
.modal-date {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem; font-weight: 700;
  color: var(--ocra); margin-bottom: 16px;
}

/* Sezioni modale */
.m-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid #eee; }
.m-label {
  font-size: 0.66rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-mid); margin-bottom: 7px;
}

/* Nota */
.modal textarea {
  width: 100%; height: 72px;
  border: 1.5px solid #ddd; border-radius: 7px;
  padding: 8px 10px; font-family: 'Lato', sans-serif;
  font-size: 0.87rem; color: var(--text-dark);
  resize: vertical; outline: none; background: #faf7f2;
  transition: border-color 0.15s;
}
.modal textarea:focus { border-color: var(--ocra); }

/* Nota con microfono */
.note-wrap { display: flex; align-items: flex-start; gap: 6px; }
.note-wrap textarea { flex: 1; }
.btn-mic {
  flex-shrink: 0; width: 38px; height: 38px;
  border-radius: 50%; border: 2px solid #ddd;
  background: #fff; font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; margin-top: 1px;
}
.btn-mic:hover { border-color: #c0392b; }
.btn-mic.recording { background: #c0392b; border-color: #c0392b; animation: pulse 1s infinite; }
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.12); }
}
.mic-status { font-size: 0.75rem; color: var(--text-mid); min-height: 16px; margin-top: 3px; }
.mic-status.rec { color: #c0392b; font-weight: 700; }
.mic-status.ok  { color: var(--ettore); }
.mic-status.err { color: #c0392b; }

/* Compleanni / ricorrenze */
.recurrence-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px; }
.rec-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.83rem;
}
.rec-item select {
  border: 1.5px solid #ddd; border-radius: 5px; padding: 3px 5px;
  font-family: 'Lato', sans-serif; font-size: 0.78rem;
  background: #faf7f2; color: var(--text-dark); outline: none;
}
.rec-item input[type="text"] {
  flex: 1; border: 1.5px solid #ddd; border-radius: 5px; padding: 4px 8px;
  font-family: 'Lato', sans-serif; font-size: 0.83rem;
  background: #faf7f2; color: var(--text-dark); outline: none;
  transition: border-color 0.15s;
}
.rec-item input[type="text"]:focus { border-color: var(--ocra); }
.rec-remove {
  background: none; border: none; cursor: pointer;
  color: #ccc; font-size: 1rem; line-height: 1; padding: 0 2px;
}
.rec-remove:hover { color: #8b1a1a; }
.btn-add-rec {
  background: none; border: 1.5px dashed #ccc; border-radius: 6px;
  padding: 5px 10px; font-size: 0.75rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-mid); cursor: pointer; width: 100%;
  transition: all 0.15s;
}
.btn-add-rec:hover { border-color: var(--ocra); color: var(--ocra); }

/* Proprietario */
.scope-toggle {
  display: flex; border-radius: 7px; overflow: hidden;
  border: 1.5px solid #ddd; margin-bottom: 9px;
}
.scope-btn {
  flex: 1; padding: 6px 0; border: none; background: #f5f5f5;
  font-family: 'Lato', sans-serif; font-size: 0.72rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-mid); transition: all 0.15s;
}
.scope-btn:first-child { border-right: 1.5px solid #ddd; }
.scope-btn.active { background: var(--ocra); color: #fff; }

.owner-btns { display: flex; gap: 8px; }
.btn-owner {
  flex: 1; padding: 7px 0; border-radius: 7px; border: 2px solid transparent;
  font-family: 'Lato', sans-serif; font-size: 0.8rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.07em; text-transform: uppercase;
  transition: all 0.15s; opacity: 0.4;
}
.btn-owner.ettore  { background: var(--ettore-bg);  color: var(--ettore); }
.btn-owner.barbara { background: var(--barbara-bg); color: var(--barbara); }
.btn-owner.active  { opacity: 1; border-color: currentColor; }

/* Azioni */
.modal-actions {
  display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;
}
.btn {
  padding: 7px 16px; border-radius: 6px; border: none;
  font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.8; }
.btn-cancel { background: #eee; color: var(--text-mid); }
.btn-save   { background: var(--ocra); color: #fff; }
.btn-gcal   { background: #4285F4; color: #fff; display: inline-flex; align-items: center; gap: 5px; }

/* ── PULSANTI HEADER ─────────────────────────────────── */
.header-actions {
  display: flex; justify-content: center; gap: 10px;
  margin-top: 14px; flex-wrap: wrap;
}
.btn-action {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 20px; border-radius: 8px; cursor: pointer;
  font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: 2px solid; transition: all 0.18s;
}
.btn-action svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }
.btn-action.ical   { background: #fff; border-color: var(--ettore); color: var(--ettore); }
.btn-action.ical:hover   { background: var(--ettore);   color: #fff; }
.btn-action.report { background: #fff; border-color: var(--barbara); color: var(--barbara); }
.btn-action.report:hover { background: var(--barbara); color: #fff; }

.year-nav {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin: 12px 0 4px;
}
.year-btn {
  background: #fff; border: 2px solid #ddd; border-radius: 7px;
  padding: 6px 14px; font-family: 'Lato', sans-serif;
  font-size: 0.82rem; font-weight: 700; cursor: pointer;
  color: var(--text-mid); transition: all 0.15s; letter-spacing: 0.05em;
}
.year-btn:hover { border-color: var(--ocra); color: var(--ocra); }
.today-btn { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; }

/* ── QR SCANNER ──────────────────────────────────────── */
.qr-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 2100;
  align-items: center; justify-content: center;
}
.qr-overlay.open { display: flex; }
.qr-modal {
  background: #1a1a1a; border-radius: 16px;
  width: 340px; max-width: 95vw; overflow: hidden;
}
.qr-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; background: #2a2a2a;
  color: #fff; font-family: 'Lato',sans-serif; font-size: 0.9rem; font-weight: 700;
}
.qr-header button {
  background: none; border: none; color: #aaa;
  font-size: 1.4rem; cursor: pointer; line-height: 1;
}
.qr-viewport {
  position: relative; width: 100%; aspect-ratio: 1;
  overflow: hidden; background: #000;
}
#qrVideo {
  width: 100%; height: 100%; object-fit: cover;
}
.qr-frame {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 60%; aspect-ratio: 1;
  border: 3px solid var(--ocra);
  border-radius: 12px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  animation: qrpulse 1.5s ease-in-out infinite;
}
@keyframes qrpulse {
  0%,100% { border-color: var(--ocra); }
  50%      { border-color: #fff; }
}
.qr-status {
  padding: 12px 16px; color: #ccc;
  font-family: 'Lato',sans-serif; font-size: 0.82rem;
  text-align: center; min-height: 44px;
}
.qr-status.ok  { color: #6B7A45; font-weight: 700; }
.qr-status.err { color: #e74c3c; }
.btn-scan {
  display: flex; align-items: center; gap: 6px; justify-content: center;
  width: 100%; padding: 8px; margin-bottom: 8px;
  border: 1.5px dashed #c0392b; border-radius: 7px; background: #fff8f8;
  font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: #c0392b; cursor: pointer; transition: all 0.15s;
}
.btn-scan:hover { background: #fdecea; border-style: solid; }

.scan-status {
  font-size: 0.78rem; color: var(--text-mid); text-align: center;
  padding: 6px 0; min-height: 24px;
}
.scan-status.loading { color: var(--ocra); }
.scan-status.ok      { color: var(--ettore); }
.scan-status.err     { color: #c0392b; }

/* Griglia miniature scontrini */
.receipts-grid {
  display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0;
}
.receipt-thumb {
  position: relative; width: 58px; height: 58px;
  border-radius: 6px; overflow: hidden;
  border: 1.5px solid #ddd; cursor: pointer; flex-shrink: 0;
}
.receipt-thumb img {
  width: 100%; height: 100%; object-fit: cover;
}
.receipt-thumb .del-receipt {
  position: absolute; top: 1px; right: 2px;
  background: rgba(0,0,0,0.55); color: #fff;
  border: none; border-radius: 50%; width: 16px; height: 16px;
  font-size: 0.65rem; cursor: pointer; display: flex;
  align-items: center; justify-content: center; line-height: 1;
}

/* Modale anteprima foto */
.photo-preview-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.82); z-index: 2000;
  align-items: center; justify-content: center;
}
.photo-preview-overlay.open { display: flex; }
.photo-preview-overlay img {
  max-width: 92vw; max-height: 88vh;
  border-radius: 10px; box-shadow: 0 4px 30px rgba(0,0,0,0.5);
}
.photo-preview-overlay .close-photo {
  position: fixed; top: 18px; right: 22px;
  background: rgba(255,255,255,0.15); border: none;
  color: #fff; font-size: 1.8rem; cursor: pointer;
  border-radius: 50%; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
}

/* ── SEZIONE SPESE nel modale ────────────────────────── */
.expense-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
.exp-item {
  display: flex; flex-direction: column; gap: 4px;
  background: #faf7f2; border: 1px solid #e8e0d4;
  border-radius: 7px; padding: 7px 8px;
}
.exp-item-row {
  display: flex; gap: 5px; align-items: center;
}
.exp-item select, .exp-item input {
  border: 1.5px solid #ddd; border-radius: 5px; padding: 5px 7px;
  font-family: 'Lato', sans-serif; font-size: 0.82rem;
  background: #fff; color: var(--text-dark); outline: none;
  transition: border-color 0.15s; min-width: 0;
}
.exp-item select:focus, .exp-item input:focus { border-color: var(--ocra); }
.exp-item select { flex-shrink: 0; }
.exp-item .inp-desc { flex: 1; }

<script>
'use strict';

/* ── API KEY GROQ ─────────────────────────────────────────── */
let GROQ_API_KEY = lsGetEarly('groq_api_key') || '';

function lsGetEarly(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }

function getApiKey() {
  if (GROQ_API_KEY) return GROQ_API_KEY;
  const key = prompt('Inserisci la tua API key Groq (gsk_...):\n\nRegistrati gratis su console.groq.com\nVerrà salvata localmente sul dispositivo.');
  if (key && key.trim().length > 10) {
    GROQ_API_KEY = key.trim();
    try { localStorage.setItem('groq_api_key', GROQ_API_KEY); } catch(e) {}
    return GROQ_API_KEY;
  }
  return null;
}

/* ── CATEGORIE SPESE ───────────────────────────────────── */
const CATEGORIES = [
  { id: 'casa',       label: 'Casa',            icon: '🏠' },
  { id: 'cibo',       label: 'Cibo',            icon: '🛒' },
  { id: 'auto',       label: 'Auto/Trasporti',  icon: '🚗' },
  { id: 'salute',     label: 'Salute',          icon: '💊' },
  { id: 'svago',      label: 'Svago/Hobby',     icon: '🎭' },
  { id: 'tributi',    label: 'Tributi',         icon: '🏛️' },
  { id: 'bollette',   label: 'Bollette',        icon: '💡' },
];

/* ── DATI ──────────────────────────────────────────────── */
let YEAR  = new Date().getFullYear();
let MONTH = new Date().getMonth(); // 0-11

// Algoritmo di Butcher per il calcolo della Pasqua
function easterDate(y) {
  const a = y % 19, b = Math.floor(y/100), c = y % 100;
  const d = Math.floor(b/4), e = b % 4, f = Math.floor((b+8)/25);
  const g = Math.floor((b-f+1)/3), h = (19*a+b-d-g+15) % 30;
  const i = Math.floor(c/4), k = c % 4;
  const l = (32+2*e+2*i-h-k) % 7;
  const m = Math.floor((a+11*h+22*l)/451);
  const month = Math.floor((h+l-7*m+114)/31); // 1-based
  const day   = ((h+l-7*m+114) % 31) + 1;
  return { m: pad(month), d: pad(day) };
}

function getHolidays(y) {
  const e = easterDate(y);
  const eM = parseInt(e.m), eD = parseInt(e.d);
  // Lunedì dell'Angelo = Pasqua + 1
  const easterDate2 = new Date(y, eM-1, eD);
  const monday = new Date(easterDate2); monday.setDate(monday.getDate()+1);
  const mM = pad(monday.getMonth()+1), mD = pad(monday.getDate());
  return {
    '01-01': 'Capodanno',
    '01-06': 'Epifania',
    [e.m+'-'+e.d]: 'Pasqua',
    [mM+'-'+mD]: "Lunedì dell'Angelo",
    '04-25': 'Liberazione',
    '05-01': 'Festa del Lavoro',
    '06-02': 'Repubblica',
    '08-15': 'Ferragosto',
    '11-01': 'Ognissanti',
    '12-08': 'Immacolata',
    '12-25': 'Natale',
    '12-26': 'S. Stefano',
  };
}

let HOLIDAYS = getHolidays(YEAR);

const MONTH_NAMES = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                     'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAY_NAMES   = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];

/* ── STORAGE HELPERS ───────────────────────────────────── */
function lsGet(k)      { try { return localStorage.getItem(k); } catch(e) { return null; } }
function lsSet(k, v)   { try { localStorage.setItem(k, v); } catch(e) {} }
function lsRemove(k)   { try { localStorage.removeItem(k); } catch(e) {} }
function lsGetJSON(k)  { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }
function lsSetJSON(k,v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

/* ── UTILITIES ─────────────────────────────────────────── */
function pad(n) { return String(n).padStart(2,'0'); }
function mmdd(date) { return pad(date.getMonth()+1) + '-' + pad(date.getDate()); }
function fullKey(date) { return date.getFullYear() + '-' + mmdd(date); }

function getISOWeek(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const y0 = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - y0) / 86400000) + 1) / 7);
}

/* ── PROPRIETARIO ──────────────────────────────────────── */
// Settimana 13 = barbara (dispari → barbara)
function defaultWeekOwner(isoW) { return isoW % 2 === 1 ? 'barbara' : 'ettore'; }
function weekOwner(isoW) { return lsGet('week_' + isoW) || defaultWeekOwner(isoW); }
function dayOwner(key, isoW) { return lsGet('day_' + key) || weekOwner(isoW); }

/* ── COSTRUZIONE CALENDARIO ─────────────────────────────── */
function buildMonth(month) {
  const wrap = document.createElement('div');
  wrap.className = 'month-block';

  const titleEl = document.createElement('div');
  titleEl.className = 'month-title';
  titleEl.textContent = MONTH_NAMES[month] + ' ' + YEAR;
  wrap.appendChild(titleEl);

  const grid = document.createElement('div');
  grid.className = 'cal-grid';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'cal-header';
  ['W','Sab','Dom','Lun','Mar','Mer','Gio','Ven'].forEach(label => {
    const d = document.createElement('div');
    d.textContent = label;
    hdr.appendChild(d);
  });
  grid.appendChild(hdr);

  // Sabato iniziale
  const firstDay = new Date(YEAR, month, 1);
  const dow = firstDay.getDay();
  const offset = dow === 6 ? 0 : (dow + 1) % 7;
  let cursor = new Date(YEAR, month, 1 - offset);
  const lastDay = new Date(YEAR, month + 1, 0);

  while (true) {
    while (cursor.getDay() !== 6) cursor.setDate(cursor.getDate() + 1);
    const wkStart = new Date(cursor);
    const isoW = getISOWeek(wkStart);
    const owner = weekOwner(isoW);

    // Cella W
    const cellW = document.createElement('div');
    cellW.className = 'cell-w';
    cellW.dataset.isoweek = isoW;
    cellW.style.background = owner === 'ettore' ? 'var(--ettore-bg)' : 'var(--barbara-bg)';
    const wspan = document.createElement('span');
    wspan.className = 'week-num wn-' + owner;
    wspan.textContent = isoW;
    cellW.appendChild(wspan);
    grid.appendChild(cellW);

    // Wrapper giorni
    const daysWrap = document.createElement('div');
    daysWrap.className = 'week-days-wrap';
    daysWrap.dataset.isoweek = isoW;
    setWeekAppearance(daysWrap, cellW, isoW);

    let hasThisMonth = false;
    for (let i = 0; i < 7; i++) {
      const day = new Date(wkStart);
      day.setDate(wkStart.getDate() + i);
      const inMonth = day.getMonth() === month;
      if (inMonth) hasThisMonth = true;

      const key = fullKey(day);
      const md  = mmdd(day);
      const isHoliday = !!(HOLIDAYS[md] && inMonth);

      const cell = document.createElement('div');
      cell.className = 'day-cell' + (inMonth ? ' in-month' : '');
      cell.dataset.key = key;
      cell.dataset.isoweek = isoW;

      // Numero
      const numEl = document.createElement('div');
      numEl.className = 'day-num' + (isHoliday ? ' holiday' : '') + (!inMonth ? ' empty' : '');
      numEl.textContent = day.getDate();
      if (isHoliday && inMonth) numEl.title = HOLIDAYS[md];
      cell.appendChild(numEl);

      // Icone
      const icons = document.createElement('div');
      icons.className = 'day-icons';
      cell.appendChild(icons);

      if (inMonth) {
        // Override colore singolo giorno
        const dayOv = lsGet('day_' + key);
        if (dayOv) cell.classList.add('day-override-' + dayOv);

        refreshIcons(cell, key);
        cell.addEventListener('click', function() { openModal(key, day, isoW, daysWrap, cellW, cell); });
      }

      daysWrap.appendChild(cell);
    }

    grid.appendChild(daysWrap);
    cursor.setDate(cursor.getDate() + 7);
    if (!hasThisMonth) break;
    if (cursor > lastDay) break;
  }

  wrap.appendChild(grid);
  return wrap;
}

function setWeekAppearance(daysWrap, cellW, isoW) {
  const owner = weekOwner(isoW);
  const name  = owner === 'ettore' ? 'Ettore' : 'Barbara';
  daysWrap.dataset.owner = owner;
  daysWrap.dataset.name  = name;
  daysWrap.style.background = '';  // lascia al CSS data-owner
  cellW.style.background = owner === 'ettore' ? 'var(--ettore-bg)' : 'var(--barbara-bg)';
  const ws = cellW.querySelector('.week-num');
  if (ws) ws.className = 'week-num wn-' + owner;
  // riapplica override singoli giorni
  daysWrap.querySelectorAll('.day-cell.in-month').forEach(cell => {
    const k = cell.dataset.key;
    const ov = lsGet('day_' + k);
    cell.classList.remove('day-override-ettore','day-override-barbara');
    if (ov) cell.classList.add('day-override-' + ov);
  });
}

function refreshIcons(cell, key) {
  const icons = cell.querySelector('.day-icons');
  const numEl = cell.querySelector('.day-num');
  if (!icons || !numEl) return;

  icons.innerHTML = '';

  const hasNote    = !!lsGet('nota_' + key);
  const md         = key.slice(5); // MM-DD
  const recs       = lsGetJSON('rec_annual_' + md) || [];
  const exps       = lsGetJSON('exp_' + key) || [];
  const hasReceipt = !!(lsGetJSON('receipts_' + key) || []).length;

  if (hasNote)    icons.innerHTML += '<span class="icon-note" title="Nota">·</span>';
  recs.forEach(r => {
    if (r.type === 'birthday')   icons.innerHTML += '<span class="icon-birthday" title="' + escHtml(r.name) + '">🎂</span>';
    else if (r.type === 'event') icons.innerHTML += '<span class="icon-event"    title="' + escHtml(r.name) + '">⭐</span>';
  });
  if (exps.length) {
    const tot = exps.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
    icons.innerHTML += '<span class="icon-expense" title="Spese: €' + tot.toFixed(2) + '">€</span>';
  }

  // Badge sul numero: appare se c'è qualsiasi contenuto
  const hasContent = hasNote || recs.length > 0 || exps.length > 0 || hasReceipt;
  let badge = numEl.querySelector('.day-badge');
  if (hasContent) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'day-badge';
      numEl.appendChild(badge);
    }
  } else {
    if (badge) badge.remove();
  }
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Costruisci
const container = document.getElementById('calendar');

function renderCalendar() {
  try {
    HOLIDAYS = getHolidays(YEAR);
    document.getElementById('yearDisplay').textContent = YEAR;
    document.title = 'Calendario ' + YEAR + ' – E & B';
    const lbl = document.getElementById('monthNavLabel');
    if (lbl) lbl.textContent = MONTH_NAMES[MONTH] + ' ' + YEAR;
    container.innerHTML = '';
    container.appendChild(buildMonth(MONTH));
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || !k.startsWith('rec_annual_')) continue;
      const md = k.slice(11);
      const dateKey = YEAR + '-' + md;
      document.querySelectorAll('[data-key="' + dateKey + '"]').forEach(cell => {
        refreshIcons(cell, dateKey);
      });
    }
  } catch(e) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#c0392b;font-family:Lato,sans-serif;font-size:0.9rem;">⚠ Errore: ' + e.message + '</div>';
    console.error('renderCalendar error:', e);
  }
}

renderCalendar();

function openModal(key, day, isoW, daysWrap, cellW, cell) {
  curKey   = key;
  curDay   = day;
  curIsoW  = isoW;
  curWrap  = daysWrap;
  curCellW = cellW;
  curCell  = cell;

  modalDate.textContent = DAY_NAMES[day.getDay()] + ' ' + day.getDate() + ' ' + MONTH_NAMES[day.getMonth()] + ' ' + YEAR;
  modalNote.value = lsGet('nota_' + key) || '';

  // Spese
  buildExpList(lsGetJSON('exp_' + key) || []);
  buildReceiptsGrid(lsGetJSON('receipts_' + key) || []);
  scanStatus.textContent = '';

  // Proprietario
  selOwner = lsGet('day_' + key) || weekOwner(isoW);
  selScope = lsGet('day_' + key) ? 'day' : 'week';
  updateOwnerUI();

  // Ricorrenze: guarda per MM-DD (annuali)
  const md = pad(day.getMonth()+1) + '-' + pad(day.getDate());
  const recs = lsGetJSON('rec_annual_' + md) || [];
  buildRecList(recs);

  overlay.classList.add('open');
  setTimeout(() => modalNote.focus(), 60);

  // Mostra pulsante Google Cal se c'è contenuto
  updateGcalBtn();
}

function updateGcalBtn() {
  const btnGcal = document.getElementById('btnGcal');
  const hasNote = !!(modalNote.value.trim());
  const hasExp  = expList.querySelectorAll('.exp-item').length > 0;
  const hasRec  = recList.querySelectorAll('.rec-item').length > 0;
  btnGcal.style.display = (hasNote || hasExp || hasRec) ? 'inline-flex' : 'none';
}

function buildGcalUrl(day, note, exps, recs) {
  // Data nel formato YYYYMMDD
  const y = day.getFullYear();
  const m = String(day.getMonth()+1).padStart(2,'0');
  const d = String(day.getDate()).padStart(2,'0');
  const dateStr = y + m + d;

  // Titolo evento
  const parts = [];
  if (recs.length) parts.push(recs.map(r => (r.type==='birthday'?'🎂':'⭐') + ' ' + r.name).join(', '));
  if (exps.length) {
    const tot = exps.reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
    parts.push('💶 Spese €' + tot.toFixed(2));
  }
  if (!parts.length && note) parts.push('📝 Nota');
  const title = parts.join(' · ') || 'Evento';

  // Descrizione
  let desc = '';
  if (note) desc += note + '\n\n';
  if (exps.length) {
    desc += 'Spese:\n';
    exps.forEach(e => { desc += '• ' + e.desc + ' €' + parseFloat(e.amount).toFixed(2) + '\n'; });
  }

  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: title,
    dates: dateStr + '/' + dateStr,
    details: desc.trim(),
  });
  return 'https://calendar.google.com/calendar/render?' + params.toString();
}

async function handleReceiptFile(file) {
  if (!file) return;

  const base64 = await fileToBase64(file);
  const mimeType = file.type || 'image/jpeg';

  const receipts = lsGetJSON('receipts_' + curKey) || [];
  receipts.push(base64);
  lsSetJSON('receipts_' + curKey, receipts);
  buildReceiptsGrid(receipts);

  scanStatus.textContent = '🔍 Analizzo lo scontrino…';
  scanStatus.className = 'scan-status loading';

  const apiKey = getApiKey();
  if (!apiKey) {
    scanStatus.textContent = '⚠ API key mancante — impossibile analizzare';
    scanStatus.className = 'scan-status err';
    return;
  }

  try {
    const imageData = base64.split(',')[1];
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey,
      },
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout-17b-16e-instruct',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image_url', image_url: { url: `data:${mimeType};base64,${imageData}` } },
            { type: 'text', text: `Analizza questo scontrino e rispondi SOLO con un JSON valido, senza backtick né testo aggiuntivo.
Formato richiesto:
{"items": [{"desc": "descrizione voce", "cat": "categoria", "amount": 0.00}]}
Le categorie disponibili sono: casa, cibo, auto, salute, svago, tributi, bollette.
Se lo scontrino ha un solo totale, restituisci un solo item.
Se non riesci a leggere l'importo, usa 0.` }
          ]
        }]
      })
    });

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      const msg = errData?.error?.message || 'HTTP ' + response.status;
      scanStatus.textContent = '⚠ Errore API: ' + msg;
      scanStatus.className = 'scan-status err';
      return;
    }

    const data = await response.json();
    const text = data?.choices?.[0]?.message?.content || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    if (parsed.items && parsed.items.length) {
      parsed.items.forEach(item => addExpRow(item.cat || 'cibo', item.desc || '', item.amount || 0));
      scanStatus.textContent = '✓ ' + parsed.items.length + ' voce/i importata/e';
      scanStatus.className = 'scan-status ok';
    } else {
      scanStatus.textContent = 'Nessuna voce trovata — aggiungi manualmente';
      scanStatus.className = 'scan-status err';
    }
  } catch(e) {
    scanStatus.textContent = '⚠ ' + (e.message || 'Errore di rete');
    scanStatus.className = 'scan-status err';
  }
}

/* ── QR SCANNER ──────────────────────────────────────── */
const qrOverlay = document.getElementById('qrOverlay');
const qrVideo   = document.getElementById('qrVideo');
const qrStatus  = document.getElementById('qrStatus');
let qrStream    = null;
let qrAnimFrame = null;
let qrCanvas    = null;

document.getElementById('btnQR').addEventListener('click', openQrScanner);
document.getElementById('qrClose').addEventListener('click', closeQrScanner);

async function openQrScanner() {
  qrOverlay.classList.add('open');
  qrStatus.textContent = 'Avvio fotocamera…';
  qrStatus.className = 'qr-status';

  try {
    qrStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1280 } }
    });
    qrVideo.srcObject = qrStream;
    await qrVideo.play();
    qrStatus.textContent = 'Inquadra il QR code in fondo allo scontrino';
    qrCanvas = document.createElement('canvas');
    scanQrFrame();
  } catch(e) {
    qrStatus.textContent = '⚠ Fotocamera non disponibile: ' + e.message;
    qrStatus.className = 'qr-status err';
  }
}

function scanQrFrame() {
  if (!qrVideo.videoWidth) { qrAnimFrame = requestAnimationFrame(scanQrFrame); return; }
  qrCanvas.width  = qrVideo.videoWidth;
  qrCanvas.height = qrVideo.videoHeight;
  const ctx = qrCanvas.getContext('2d');
  ctx.drawImage(qrVideo, 0, 0);
  const imgData = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
  const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });

  if (code) {
    handleQrCode(code.data);
  } else {
    qrAnimFrame = requestAnimationFrame(scanQrFrame);
  }
}

function closeQrScanner() {
  if (qrAnimFrame) cancelAnimationFrame(qrAnimFrame);
  if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
  qrVideo.srcObject = null;
  qrOverlay.classList.remove('open');
}

function handleQrCode(qrText) {
  qrStatus.textContent = '✓ QR rilevato! Elaboro…';
  qrStatus.className = 'qr-status ok';

  // Piccola vibrazione feedback
  if (navigator.vibrate) navigator.vibrate(100);

  setTimeout(() => closeQrScanner(), 800);

  // Il QR degli scontrini italiani contiene un URL con parametri
  // Formato: https://www.agenziaentrate.gov.it/...?z=...&amount=...
  // oppure testo strutturato con importo
  try {
    let amount = 0;
    let desc   = 'Scontrino';

    // Prova a parsare come URL
    if (qrText.startsWith('http')) {
      const url    = new URL(qrText);
      const params = url.searchParams;

      // Parametri comuni negli scontrini italiani
      const amtParam = params.get('amount') || params.get('tot') ||
                       params.get('importo') || params.get('t');
      if (amtParam) amount = parseFloat(amtParam.replace(',', '.')) || 0;

      // Prova a estrarre l'importo dal path o da altri parametri
      if (!amount) {
        const match = qrText.match(/[?&][tT](?:ot(?:ale)?)?=([0-9]+[.,][0-9]+)/);
        if (match) amount = parseFloat(match[1].replace(',', '.')) || 0;
      }
    } else {
      // Testo strutturato — cerca pattern importo
      const match = qrText.match(/(\d+[.,]\d{2})/g);
      if (match) {
        // Prendi il valore più alto (di solito il totale)
        amount = Math.max(...match.map(m => parseFloat(m.replace(',', '.'))));
      }
    }

    if (amount > 0) {
      addExpRow('cibo', desc, amount);
      scanStatus.textContent = '✓ Totale €' + amount.toFixed(2) + ' importato dal QR';
      scanStatus.className = 'scan-status ok';
    } else {
      // Nessun importo trovato — chiedi manualmente
      const manualAmt = prompt('QR letto! Inserisci il totale dello scontrino (€):');
      if (manualAmt) {
        amount = parseFloat(manualAmt.replace(',', '.')) || 0;
        if (amount > 0) {
          addExpRow('cibo', 'Scontrino', amount);
          scanStatus.textContent = '✓ Spesa €' + amount.toFixed(2) + ' aggiunta';
          scanStatus.className = 'scan-status ok';
        }
      }
    }
  } catch(e) {
    scanStatus.textContent = '⚠ QR letto ma importo non trovato — aggiungi manualmente';
    scanStatus.className = 'scan-status err';
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Lettura fallita'));
    r.readAsDataURL(file);
  });
}

function buildReceiptsGrid(receipts) {
  receiptsGrid.innerHTML = '';
  receipts.forEach((b64, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'receipt-thumb';

    const img = document.createElement('img');
    img.src = b64;
    img.alt = 'Scontrino';
    img.addEventListener('click', () => openPhotoPreview(b64));

    const del = document.createElement('button');
    del.className = 'del-receipt';
    del.type = 'button';
    del.textContent = '×';
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      const recs = lsGetJSON('receipts_' + curKey) || [];
      recs.splice(idx, 1);
      if (recs.length) lsSetJSON('receipts_' + curKey, recs);
      else             lsRemove('receipts_' + curKey);
      buildReceiptsGrid(recs);
    });

    wrap.appendChild(img);
    wrap.appendChild(del);
    receiptsGrid.appendChild(wrap);
  });
}

const btnMic   = document.getElementById('btnMic');
const micStatus = document.getElementById('micStatus');
let recognition = null;
let isRecording = false;

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.lang = 'it-IT';
  r.continuous = true;
  r.interimResults = true;
  return r;
}

btnMic.addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
});

async function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    micStatus.textContent = '⚠ Non supportato — usa Chrome o Safari';
    micStatus.className = 'mic-status err';
    return;
  }

  // Richiedi permesso microfono esplicitamente prima
  try {
    await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    micStatus.textContent = '⚠ Permesso microfono negato';
    micStatus.className = 'mic-status err';
    return;
  }

  isRecording = true;
  btnMic.classList.add('recording');
  btnMic.textContent = '⏹';
  micStatus.textContent = '🔴 Registrazione in corso… parla ora';
  micStatus.className = 'mic-status rec';

  recognition = new SpeechRecognition();
  recognition.lang = 'it-IT';
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalText = modalNote.value;

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    if (final) finalText += (finalText.trim() ? ' ' : '') + final.trim();
    modalNote.value = finalText + (interim ? ' ' + interim : '');
    updateGcalBtn();
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return; // ignora silenzio
    micStatus.textContent = '⚠ Errore: ' + e.error;
    micStatus.className = 'mic-status err';
    stopRecording();
  };

  recognition.onend = () => {
    if (isRecording) {
      try { recognition.start(); } catch(e) {}
    }
  };

  try {
    recognition.start();
  } catch(e) {
    micStatus.textContent = '⚠ Impossibile avviare il microfono';
    micStatus.className = 'mic-status err';
    isRecording = false;
    btnMic.classList.remove('recording');
    btnMic.textContent = '🎤';
  }
}

function stopRecording() {
  isRecording = false;
  btnMic.classList.remove('recording');
  btnMic.textContent = '🎤';
  if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
  micStatus.textContent = '✓ Nota aggiunta';
  micStatus.className = 'mic-status ok';
  setTimeout(() => { micStatus.textContent = ''; micStatus.className = 'mic-status'; }, 2500);
}

/* ── REPORT SPESE ────────────────────────────────────── */
const reportOverlay = document.getElementById('reportOverlay');
const reportBody    = document.getElementById('reportBody');
const reportDetail  = document.getElementById('reportDetail');
const filterMonth   = document.getElementById('filterMonth');

function openReport() {
  document.getElementById('reportTitle').textContent = '📊 Report Spese ' + YEAR;
  renderReport();
  reportOverlay.classList.add('open');
}
function closeReport() { reportOverlay.classList.remove('open'); }

function renderReport() {
  const monthFilter = filterMonth.value; // 'all' or '0'..'11'

  // Raccogli tutte le spese
  const allExp = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k || !k.startsWith('exp_')) continue;
    const dateStr = k.slice(4); // YYYY-MM-DD
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) continue;
    const [y, m] = dateStr.split('-');
    if (parseInt(y) !== YEAR) continue;
    if (monthFilter !== 'all' && parseInt(m) - 1 !== parseInt(monthFilter)) continue;
    const exps = lsGetJSON(k) || [];
    exps.forEach(e => allExp.push({ date: dateStr, ...e }));
  }

  // Totali per categoria
  const totals = {};
  CATEGORIES.forEach(c => totals[c.id] = 0);
  allExp.forEach(e => { if (totals[e.cat] !== undefined) totals[e.cat] += parseFloat(e.amount) || 0; });
  const grandTotal = Object.values(totals).reduce((a, b) => a + b, 0);
  const maxCat = Math.max(...Object.values(totals), 0.01);

  // Tabella
  reportBody.innerHTML = '';
  CATEGORIES.forEach(c => {
    const amt = totals[c.id];
    const pct = maxCat > 0 ? (amt / maxCat * 100) : 0;
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td><span class="cat-icon">' + c.icon + '</span>' + c.label + '</td>' +
      '<td><div class="cat-bar-wrap"><div class="cat-bar" style="width:' + pct.toFixed(1) + '%"></div></div></td>' +
      '<td class="amount' + (amt === 0 ? ' zero' : '') + '">€ ' + amt.toFixed(2) + '</td>';
    reportBody.appendChild(tr);
  });

  // Riga totale
  const trTot = document.createElement('tr');
  trTot.className = 'total-row';
  trTot.innerHTML = '<td colspan="2"><strong>Totale</strong></td><td class="amount">€ ' + grandTotal.toFixed(2) + '</td>';
  reportBody.appendChild(trTot);

  // Dettaglio cronologico
  if (allExp.length === 0) {
    reportDetail.innerHTML = '<div class="no-data">Nessuna spesa registrata per il periodo selezionato.</div>';
    return;
  }

  allExp.sort((a, b) => a.date.localeCompare(b.date));
  const cat = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));
  reportDetail.innerHTML = '<div class="detail-title">Dettaglio spese</div>';
  allExp.forEach(e => {
    const c = cat[e.cat] || { icon: '?', label: e.cat };
    const [y, m, d] = e.date.split('-');
    const dateLabel = parseInt(d) + ' ' + MONTH_NAMES[parseInt(m)-1];
    const div = document.createElement('div');
    div.className = 'detail-item';
    div.innerHTML =
      '<span class="di-date">' + dateLabel + '</span>' +
      '<span class="di-cat">' + c.icon + ' ' + c.label + '</span>' +
      '<span style="flex:1;font-size:0.82rem;color:var(--text-mid)">' + escHtml(e.desc || '') + '</span>' +
      '<span class="di-amt">€ ' + parseFloat(e.amount).toFixed(2) + '</span>';
    // Miniatura scontrino se disponibile
    const recs = lsGetJSON('receipts_' + e.date) || [];
    if (recs.length) {
      const thumb = document.createElement('img');
      thumb.src = recs[0];
      thumb.style.cssText = 'width:28px;height:28px;object-fit:cover;border-radius:4px;margin-left:8px;cursor:pointer;border:1px solid #ddd;';
      thumb.title = 'Vedi scontrino';
      thumb.addEventListener('click', () => openPhotoPreview(recs[0]));
      div.appendChild(thumb);
    }
    reportDetail.appendChild(div);
  });
}

/* ── ESPORTA iCAL ────────────────────────────────────── */
function icalDate(dateStr) {
  // dateStr = YYYY-MM-DD → 20260101
  return dateStr.replace(/-/g, '');
}

function icalEscape(s) {
  return (s || '').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}

function makeUID(key, suffix) {
  return key + '-' + suffix + '@calendario2026';
}

function exportIcal() {
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Calendario 2026//IT',
    'CALSCALE:GREGORIAN',
    'X-WR-CALNAME:Calendario 2026',
    'X-WR-TIMEZONE:Europe/Rome',
  ];

  // Scansiona tutto il localStorage
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i));

  keys.forEach(k => {
    if (!k) return;

    // Note: nota_YYYY-MM-DD
    if (k.startsWith('nota_')) {
      const dateStr = k.slice(5);
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return;
      const val = lsGet(k);
      if (!val) return;
      const d = icalDate(dateStr);
      lines.push(
        'BEGIN:VEVENT',
        'UID:' + makeUID(dateStr, 'note'),
        'DTSTART;VALUE=DATE:' + d,
        'DTEND;VALUE=DATE:' + d,
        'SUMMARY:📝 Nota',
        'DESCRIPTION:' + icalEscape(val),
        'END:VEVENT'
      );
    }

    // Ricorrenze annuali: rec_annual_MM-DD
    if (k.startsWith('rec_annual_')) {
      const md = k.slice(11); // MM-DD
      if (!/^\d{2}-\d{2}$/.test(md)) return;
      const recs = lsGetJSON(k) || [];
      const dateStr = YEAR + '-' + md;
      const d = icalDate(dateStr);
      recs.forEach((r, idx) => {
        if (!r.name) return;
        const icon = r.type === 'birthday' ? '🎂' : '⭐';
        lines.push(
          'BEGIN:VEVENT',
          'UID:' + makeUID(md, 'rec' + idx),
          'DTSTART;VALUE=DATE:' + d,
          'DTEND;VALUE=DATE:' + d,
          'SUMMARY:' + icalEscape(icon + ' ' + r.name),
          'RRULE:FREQ=YEARLY',
          'END:VEVENT'
        );
      });
    }
  });

  lines.push('END:VCALENDAR');

  const icsContent = lines.join('\r\n');

  // Prova download diretto
  try {
    const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'calendario-' + YEAR + '.ics';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  } catch(e) {
    // Fallback: mostra testo in textarea copiabile
    showIcalFallback(icsContent);
  }
}

  const existing = document.getElementById('icalFallback');

  overlay.id = 'icalFallback';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(42,34,24,0.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:24px;width:440px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;gap:12px;">
      <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#C8963E;">Esporta iCal</div>
      <div style="font-size:0.82rem;color:#5a4e3a;">Copia il testo qui sotto e salvalo come <strong>calendario.ics</strong>, poi aprilo nel tuo calendario.</div>
      <textarea id="icalText" readonly style="flex:1;min-height:200px;font-family:monospace;font-size:0.72rem;border:1.5px solid #ddd;border-radius:7px;padding:8px;resize:none;background:#faf7f2;color:#2a2218;">${text}</textarea>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="document.getElementById('icalText').select();document.execCommand('copy');this.textContent='✓ Copiato!'" style="padding:8px 16px;background:#6B7A45;color:#fff;border:none;border-radius:6px;font-family:Lato,sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;">Copia</button>
        <button onclick="document.getElementById('icalFallback').remove()" style="padding:8px 16px;background:#eee;color:#5a4e3a;border:none;border-radius:6px;font-family:Lato,sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;">Chiudi</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

    ANTHROPIC_API_KEY = '';
    try { localStorage.removeItem('anthropic_api_key'); } catch(e) {}
    alert('API key rimossa.');
  } else {
    alert('Key non valida — deve iniziare con sk-ant-');
  }
});

/* ── SERVICE WORKER & PWA ──────────────────────────────── */
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'eb-cal-v1';
const ASSETS = [location.href];

self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});

self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});

self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() =>
      caches.match(e.request)
    ))
  );
});
`;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, { scope: './' }).catch(() => {});
}

function showInstallBanner() {
  if (document.getElementById('installBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.innerHTML = `

      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);

        color:#fff; padding:8px 16px; font-family:'Lato',sans-serif;
        font-size:0.8rem; font-weight:700; cursor:pointer; white-space:nowrap;

      <button id="btnDismiss" style="

        font-size:1.2rem; cursor:pointer; padding:0 4px;
      ">×</button>
    </div>`;
