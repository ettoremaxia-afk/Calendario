<style>
  :root {
    --bg: #f5f0e8;
    --ink: #1c1c1c;
    --ink-light: #888;
    --accent: #c0392b;
    --weekend: #8b4513;
    --week-bg: #e8e0d0;
    --month-head: #1c1c1c;
    --cell-hover: #ede8de;
    --grid-line: #d4cdc0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 40px 24px 60px;
  }
  header { text-align: center; margin-bottom: 48px; }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(52px, 10vw, 96px);
    letter-spacing: -2px;
    line-height: 1;
  }
  header h1 span { color: var(--accent); font-style: italic; }
  header p {
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-light);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 32px;
    max-width: 1300px;
    margin: 0 auto;
  }
  .month {
    background: white;
    border: 1px solid var(--grid-line);
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 2px 4px 0 var(--grid-line);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .month:hover { transform: translateY(-2px); box-shadow: 2px 8px 0 var(--grid-line); }
  .month-header {
    background: var(--month-head);
    color: white;
    padding: 14px 16px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .month-name { font-family: 'DM Serif Display', serif; font-size: 22px; }
  .month-year { font-size: 11px; letter-spacing: 2px; opacity: 0.5; }
  .cal-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .cal-table thead th {
    padding: 8px 4px 6px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
    border-bottom: 1px solid var(--grid-line);
  }
  .cal-table thead th.wnum-head {
    color: var(--ink-light);
    background: var(--week-bg);
    font-size: 9px;
  }
  .cal-table thead th.sat { color: var(--weekend); }
  .cal-table thead th.sun { color: var(--accent); }
  .cal-table tbody td {
    padding: 6px 4px;
    text-align: center;
    cursor: default;
    transition: background 0.1s;
    position: relative;
  }
  .cal-table tbody td:hover:not(.wnum):not(.empty) {
    background: var(--cell-hover);
    border-radius: 2px;
  }
  .wnum {
    background: var(--week-bg);
    color: var(--ink-light);
    font-size: 9px;
    border-right: 1px solid var(--grid-line);
    width: 28px;
    font-weight: 500;
  }
  .empty { color: transparent; }
  .sat { color: var(--weekend); }
  .sun { color: var(--accent); font-weight: 500; }
  .today-cell::after {
    content: '';
    position: absolute;
    inset: 2px;
    border: 1.5px solid var(--accent);
    border-radius: 2px;
    pointer-events: none;
  }
  .today-cell span { color: var(--accent); font-weight: 700; }
  footer {
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-light);
    margin-top: 48px;
    text-transform: uppercase;
  }
  @media (max-width: 600px) {
    body { padding: 24px 12px 40px; }
    .grid { gap: 20px; grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
const MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno",
              "Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const GIORNI = ["Lu","Ma","Me","Gi","Ve","Sa","Do"];

function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

const today = new Date();

function buildMonth(year, month) {
  const div = document.createElement('div');
  div.className = 'month';
  const head = document.createElement('div');
  head.className = 'month-header';
  head.innerHTML = `<span class="month-name">${MESI[month]}</span><span class="month-year">${year}</span>`;
  div.appendChild(head);
  const table = document.createElement('table');
  table.className = 'cal-table';
  const thead = document.createElement('thead');
  let thRow = '<tr><th class="wnum-head">W</th>';
  GIORNI.forEach((g, i) => {
    const cls = i === 5 ? 'sat' : i === 6 ? 'sun' : '';
    thRow += `<th class="${cls}">${g}</th>`;
  });
  thRow += '</tr>';
  thead.innerHTML = thRow;
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startOffset = (firstDay + 6) % 7;
  let done = false;
  let weekRow = 0;
  while (!done) {
    const tr = document.createElement('tr');
    let addedWeekNum = false;
    for (let col = 0; col < 7; col++) {
      const absoluteDay = weekRow * 7 + col - startOffset + 1;
      if (!addedWeekNum) {
        const tdW = document.createElement('td');
        tdW.className = 'wnum';
        if (absoluteDay >= 1 && absoluteDay <= daysInMonth) {
          tdW.textContent = isoWeek(new Date(year, month, absoluteDay));
        } else if (absoluteDay < 1) {
          const firstValid = 1;
          tdW.textContent = isoWeek(new Date(year, month, firstValid));
        }
        tr.appendChild(tdW);
        addedWeekNum = true;
      }
      const td = document.createElement('td');
      if (absoluteDay < 1 || absoluteDay > daysInMonth) {
        td.className = 'empty';
        td.textContent = '';
      } else {
        const isSat = col === 5, isSun = col === 6;
        td.className = isSat ? 'sat' : isSun ? 'sun' : '';
        const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===absoluteDay;
        if (isToday) {
          td.className += ' today-cell';
          td.innerHTML = `<span>${absoluteDay}</span>`;
        } else {
          td.textContent = absoluteDay;
        }
        if (absoluteDay === daysInMonth && col === 6) done = true;
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
    weekRow++;
    if (weekRow > 6) done = true;
  }
  table.appendChild(tbody);
  div.appendChild(table);
  return div;
}

const cal = document.getElementById('cal');
for (let m = 0; m < 12; m++) cal.appendChild(buildMonth(2026, m));

// Register service worker inline
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
